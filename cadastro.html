<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Alfa Vistoria</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7); /* slate-800 com opacidade */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom scrollbar para um visual mais limpo */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased selection:bg-brand-500 selection:text-white">

    <!-- Elementos visuais de background (Ambient Light) -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-900/20 blur-[120px]"></div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-blue-900/20 blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo Area -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Alfa Vistoria</h1>
            <p class="text-slate-400">Criar novo perfil de acesso</p>
        </div>

        <!-- Formulário Card -->
        <div class="glass-card rounded-2xl shadow-2xl p-8">
            <form id="cadastroForm" class="space-y-6" novalidate>
                
                <!-- E-mail -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-1">E-mail</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all"
                        placeholder="ex: contato@email.com">
                </div>

                <!-- Nome Completo -->
                <div>
                    <label for="fullName" class="block text-sm font-medium text-slate-300 mb-1">Nome Completo</label>
                    <input type="text" id="fullName" name="fullName" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all"
                        placeholder="João da Silva">
                </div>

                <!-- Senha -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Senha</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>

                <!-- Messages de Alerta/Sucesso -->
                <div id="messageBox" class="hidden rounded-lg p-4 text-sm font-medium text-center"></div>

                <!-- Submit Button -->
                <button type="button" id="submitBtn"
                    class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-brand-500/20 hover:shadow-brand-500/40 transition-all flex justify-center items-center gap-2 group relative">
                    <span id="btnText">Cadastrar</span>
                    <!-- Spinner de Loading (oculto por padrão) -->
                    <svg id="btnSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Lógica de Funcionamento -->
    <script>
        // ======= CONFIGURAÇÃO SUPABASE =======
        // ATENÇÃO: Substitua aqui pela sua URL real e Chave Anônima do Supabase
        const SUPABASE_URL = 'https://zlvvkltsefsytzqjorsn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dCNKa32V358Zsfpmo1Bj_A_gnfBpsVz';
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const messageBox = document.getElementById('messageBox');

        // Função auxiliar para exibir mensagens de sucesso ou erro
        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.className = `rounded-lg p-4 text-sm font-medium mt-4 block transition-all ${
                type === 'success' 
                    ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' 
                    : 'bg-red-500/10 text-red-400 border border-red-500/20'
            }`;
        }

        // Verifica se o Supabase conseguiu ser baixado 
        if (typeof window.supabase === 'undefined') {
            showMessage('Erro Crítico: A biblioteca de conexão não carregou. Verifique sua internet, adblocks ou antivírus.', 'error');
        } else {
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            submitBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                
                // Oculta a caixa de mensagem anterior
                messageBox.classList.add('hidden');

            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const password = document.getElementById('password').value;

            // Validação simples
            if (!email || !fullName || !password) {
                showMessage('Por favor, preencha todos os campos corretamente.', 'error');
                return;
            }

            // Ativa visual de "Carregando"
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.textContent = 'Processando...';
            btnSpinner.classList.remove('hidden');

            try {
                // Inserindo direto no Supabase, na nova tabela Usuarios
                const { data, error } = await supabase
                    .from('Usuarios')
                    .insert([
                        { 
                            Email: email, 
                            NomeCompleto: fullName, 
                            SenhaHash: password 
                        }
                    ]);

                if (error) {
                    // 23505 é o código de restrição unique_violation no PostgreSQL
                    if (error.code === '23505') {
                        throw new Error('E-mail Duplicado');
                    }
                    throw error;
                }

                // Feedback visual de sucesso! Aguarda 2 segundos para o usuário ler a mensagem e só então redireciona.
                showMessage('Cadastro realizado com sucesso! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (err) {
                console.error("Erro no cadastro:", err);
                // Aqui estamos tratando possíveis erros
                if (err.message === 'E-mail Duplicado') {
                    showMessage('O e-mail informado já está cadastrado em outra conta.', 'error');
                } else if (err.message && (err.message.includes("URL is required") || SUPABASE_URL === 'SUA_SUPABASE_URL_AQUI')) {
                    showMessage('Erro: Você precisa configurar suas credenciais do Supabase.', 'error');
                } else {
                    showMessage('Erro do Banco: ' + (err.message || JSON.stringify(err)), 'error');
                }

                // Restaura o botão ao estado original (APENAS se der erro)
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'Cadastrar';
                btnSpinner.classList.add('hidden');
            }
        });
        }
    </script>
</body>
</html>
