<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Financeiro Alfa São Mateus</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        // Redirecionar direto se já estiver logado
        if (localStorage.getItem('alfa_session')) {
            window.location.href = 'index.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased selection:bg-brand-500 selection:text-white">

    <!-- Background elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-900/20 blur-[120px]"></div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-blue-900/20 blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo Area -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Financeiro Alfa</h1>
            <p class="text-slate-400">Faça o login para continuar</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl shadow-2xl p-8">
            <form id="loginForm" class="space-y-6" novalidate>
                <!-- E-mail -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-1">E-mail</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all"
                        placeholder="ex: contato@email.com">
                </div>

                <!-- Senha -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Senha</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>

                <!-- Messages -->
                <div id="messageBox" class="hidden rounded-lg p-4 text-sm font-medium text-center"></div>

                <!-- Submit Button -->
                <button type="button" id="submitBtn"
                    class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-brand-500/40 transition-all flex justify-center items-center gap-2 group relative">
                    <span id="btnText">Entrar no Sistema</span>
                    <!-- Spinner (oculto por padrão) -->
                    <svg id="btnSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-400">
                Ainda não tem conta? <a href="cadastro.html" class="text-brand-400 hover:text-brand-300 transition-colors font-medium">Cadastre-se</a>
            </div>
        </div>
    </div>

    <!-- Lógica de Funcionamento -->
    <script>
        // ======= CONFIGURAÇÃO SUPABASE =======
        // IMPORTANTE: Insira a mesma URL e KEY usada no cadastro.html
        const SUPABASE_URL = 'https://zlvvkltsefsytzqjorsn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dCNKa32V358Zsfpmo1Bj_A_gnfBpsVz';
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const messageBox = document.getElementById('messageBox');

        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.className = `rounded-lg p-4 text-sm font-medium mt-4 block transition-all ${
                type === 'success' 
                    ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' 
                    : 'bg-red-500/10 text-red-400 border border-red-500/20'
            }`;
        }

        if (typeof window.supabase === 'undefined') {
            showMessage('Erro Crítico: A biblioteca de conexão não carregou.', 'error');
        } else {
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            submitBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                messageBox.classList.add('hidden');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Por favor, informe seu e-mail e senha.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.textContent = 'Verificando...';
            btnSpinner.classList.remove('hidden');

            try {
                // Busca o usuário na tabela
                const { data, error } = await supabase
                    .from('Usuarios')
                    .select('*')
                    .eq('Email', email)
                    .eq('SenhaHash', password)
                    .single();

                if (error || !data) {
                    console.log('Detalhes do Erro Supabase:', error);
                    throw new Error('Usuário não encontrado ou senha incorreta.');
                }

                // Autenticação com sucesso (salva sessão no localStorage)
                localStorage.setItem('alfa_session', JSON.stringify({
                    id: data.Id,
                    username: data.Email,
                    fullName: data.NomeCompleto
                }));

                showMessage('Bem-vindo!', 'success');
                
                // Redireciona para o financeiro imediatamente
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                
            } catch (err) {
                console.error("Erro no login:", err);
                if (err.message && (err.message.includes("URL is required") || SUPABASE_URL === 'SUA_SUPABASE_URL_AQUI')) {
                    showMessage('Erro: Configure o Supabase no código do login.html.', 'error');
                } else {
                    showMessage('Usuário não encontrado ou erro de conexão.', 'error');
                }

                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'Entrar no Sistema';
                btnSpinner.classList.add('hidden');
            }
        });
        }
    </script>
</body>
</html>
